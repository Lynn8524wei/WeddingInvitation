    :root {
      --bg: #1a0a0a;
      --bg-2: #2a1111;

    html,

      background:

      color: var(--text);
      font-family:

        "Segoe UI",

    body {
      display: grid;

    main {

      padding: 44px 28px;
      border: 1px solid rgba(212, 168, 71, 0.36);
      border-radius: 28px;

      font-size: clamp(2rem, 7vw, 3.25rem);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.8;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      min-height: 48px;
      padding: 0 24px;
      border: 1px solid rgba(212, 168, 71, 0.72);
      border-radius: 999px;
      background: linear-gradient(180deg, #f2d48a, #c8922e);
      color: #2a1111;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 12px 32px rgba(212, 168, 71, 0.24);
    }
